# Ruff - Python Linter & Formatter
# https://docs.astral.sh/ruff/

target-version = "py311"
line-length = 120
src = ["app", "tests", "scripts"]

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort (import sorting)
    "B",      # flake8-bugbear
    "S",      # flake8-bandit (security)
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E712",   # == True/False (SQLAlchemy filter requires this)
    "S101",   # assert usage (ok in tests)
    "S105",   # hardcoded password (false positives in config)
    "S106",   # hardcoded password in func arg
    "B008",   # function call in default arg (FastAPI Depends pattern)
    "RUF001", # ambiguous unicode (Portuguese strings are intentional)
    "RUF012", # mutable class variable (SQLAlchemy models)
    "RUF013", # implicit-optional (legacy code, fix incrementally)
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106", "E402"]
"scripts/**/*.py" = ["S101", "E402", "S607"]
"app/main.py" = ["E402"]
"app/routers/documents.py" = ["E402"]
"app/schemas/booking.py" = ["E402"]
"app/api/v1/auth.py" = ["E402"]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
