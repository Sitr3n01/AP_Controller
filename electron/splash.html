<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
  <title>LUMINA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #101922;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
      user-select: none;
      -webkit-app-region: drag;
      position: relative;
    }

    /* ── Background ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 25% 20%, rgba(19, 127, 236, 0.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 75% 80%, rgba(14, 165, 233, 0.08) 0%, transparent 70%),
        linear-gradient(160deg, #101922 0%, #0d1b2a 45%, #101922 100%);
      pointer-events: none;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(19, 127, 236, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(19, 127, 236, 0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }

    /* ── Decorative orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb-1 {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, #137fec, transparent 70%);
      top: -100px;
      left: -80px;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, #0ea5e9, transparent 70%);
      bottom: -80px;
      right: -60px;
      animation: orbFloat 10s ease-in-out infinite reverse;
    }

    /* ── Main content ── */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Brand text ── */
    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .app-name {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #137fec 0%, #38bdf8 50%, #7dd3fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .app-subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: #475569;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Spinner ── */
    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(19, 127, 236, 0.15);
      border-top-color: #137fec;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    /* ── Status ── */
    .status-area {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-text {
      font-size: 0.82rem;
      color: #475569;
      letter-spacing: 0.06em;
      min-height: 1.2em;
    }

    .status-dots {
      font-size: 0.82rem;
      color: #475569;
      letter-spacing: 0.04em;
      width: 18px;
      text-align: left;
    }

    /* ── Progress bar ── */
    .progress-track {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(19, 127, 236, 0.08);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #137fec, #0ea5e9, #38bdf8);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 0 2px 2px 0;
    }

    /* ── Version ── */
    .version {
      position: fixed;
      bottom: 12px;
      right: 18px;
      font-size: 0.62rem;
      color: #1e293b;
      letter-spacing: 0.06em;
      font-weight: 500;
    }

    /* ── Animations ── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(12px, -16px) scale(1.05); }
    }
  </style>
</head>
<body>
  <!-- Fundo -->
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Conteúdo central -->
  <div class="content">
    <div class="logo-block">
      <div class="app-name">LUMINA</div>
      <div class="app-subtitle">Gestão de Apartamentos</div>
    </div>

    <div class="spinner-wrap">
      <div class="spinner"></div>
    </div>

    <div class="status-area">
      <span class="status-text" id="statusText">Iniciando sistema</span>
      <span class="status-dots" id="dots"></span>
    </div>
  </div>

  <!-- Barra de progresso (atualizada pelo main process via executeJavaScript) -->
  <div class="progress-track">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Versão (preenchida dinamicamente) -->
  <div class="version" id="appVersion"></div>

  <script>
    // Animação dos pontinhos de loading
    const dotsEl = document.getElementById('dots');
    let count = 0;
    setInterval(() => {
      count = (count + 1) % 4;
      dotsEl.textContent = '.'.repeat(count);
    }, 380);
  </script>
</body>
</html>
